<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pickleball Round Robin Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ============================================================
   GLOBAL STYLES — LIGHT MODE ONLY
   ============================================================ */
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --accent: #2563eb;
  --accent-soft: #dbeafe;
  --accent-dark: #1d4ed8;
  --text: #111827;
  --muted: #6b7280;
  --danger: #dc2626;
  --border: #e5e7eb;
  --shadow-soft: 0 10px 25px rgba(15,23,42,0.08);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ============================================================
   HEADER
   ============================================================ */
.app-header {
  background: linear-gradient(135deg, #111827, #1f2937);
  color: white;
  padding: 12px 16px;
  box-shadow: var(--shadow-soft);
  position: sticky;
  top: 0;
  z-index: 20;
}

.app-title {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}

.app-subtitle {
  margin: 4px 0 0;
  font-size: 13px;
  color: #e5e7eb;
}

/* ============================================================
   TABS
   ============================================================ */
.tabs {
  display: flex;
  overflow-x: auto;
  background: #111827;
  padding: 0 8px 4px;
}

.tab {
  flex: 0 0 auto;
  padding: 8px 12px;
  margin: 4px 4px 0;
  border-radius: 999px;
  font-size: 13px;
  color: #e5e7eb;
  cursor: pointer;
  border: 1px solid transparent;
  white-space: nowrap;
}

.tab.active {
  background: #f9fafb;
  color: #111827;
  border-color: #e5e7eb;
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.app-main {
  padding: 12px;
  max-width: 1100px;
  margin: 0 auto 40px;
}

.card {
  background: var(--card);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-soft);
  border: 1px solid var(--border);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
}

.card-subtitle {
  font-size: 12px;
  color: var(--muted);
}

/* ============================================================
   FORM ELEMENTS
   ============================================================ */
label {
  display: block;
  font-size: 13px;
  margin-bottom: 4px;
  color: var(--muted);
}

input[type="number"],
input[type="text"],
select {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  margin-bottom: 8px;
}

input:focus,
select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-soft);
}

button {
  border-radius: 999px;
  border: none;
  padding: 8px 14px;
  font-size: 14px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-dark);
}

.btn-outline {
  background: white;
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-danger {
  background: var(--danger);
  color: white;
}
